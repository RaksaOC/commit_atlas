<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Commit Atlas</title>
  <style>
    :root {
      --bg0: #07090d;
      --bg1: #0c1118;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-strong: rgba(255, 255, 255, 0.07);
      --text: #e8edf5;
      --muted: #8b95a8;
      --dim: #5a6578;
      --accent: #39d353;
      --accent-rgb: 57, 211, 83;
      --accent-soft: rgba(57, 211, 83, 0.12);
      --glow: rgba(57, 211, 83, 0.08);
      --l0: #161b22;
      --l1: #0e4429;
      --l2: #006d32;
      --l3: #26a641;
      --l4: #39d353;
      --font: "Poppins", system-ui, sans-serif;
      --mono: "Poppins", system-ui, sans-serif;
      --cell: 16px;
      --gap: 4px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg0);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    body {
      background:
        radial-gradient(1200px 600px at 10% -10%, var(--glow), transparent 55%),
        radial-gradient(900px 500px at 100% 0%, rgba(255, 255, 255, 0.03), transparent 50%),
        linear-gradient(180deg, var(--bg1), var(--bg0) 40%);
    }

    /* —— Splash / curtain —— */
    .splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .splash.done { display: none; }

    .curtain {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .curtain-panel {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50.5%;
      background:
        linear-gradient(180deg, #0a1018 0%, #07090d 100%);
      transition: transform 1.15s cubic-bezier(0.76, 0, 0.24, 1);
      will-change: transform;
    }

    .curtain-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, var(--glow), transparent);
      opacity: 0.6;
    }

    .curtain-panel.left {
      left: 0;
      border-right: 1px solid var(--accent-soft);
      transform-origin: left center;
    }

    .curtain-panel.right {
      right: 0;
      border-left: 1px solid var(--accent-soft);
      transform-origin: right center;
    }

    .splash.open .curtain-panel.left { transform: translateX(-102%); }
    .splash.open .curtain-panel.right { transform: translateX(102%); }

    .splash-mark {
      position: relative;
      z-index: 2;
      text-align: center;
      opacity: 1;
      transform: scale(1);
      transition:
        opacity 0.45s ease 0.15s,
        transform 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.1s;
    }

    .splash.open .splash-mark {
      opacity: 0;
      transform: scale(1.06);
    }

    .splash-mark .eyebrow {
      margin-bottom: 14px;
    }

    .splash-mark h1 {
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .splash-mark .line {
      width: 48px;
      height: 1px;
      margin: 18px auto 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: center;
      animation: splash-line 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards;
    }

    @keyframes splash-line {
      to { transform: scaleX(1); }
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .wrap.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--glass-border);
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 500;
    }

    h1 {
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    .sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      max-width: 460px;
      line-height: 1.55;
      font-weight: 400;
    }

    .meta {
      text-align: right;
      font-size: 12px;
      color: var(--dim);
      line-height: 1.85;
      font-weight: 400;
    }

    .meta strong { color: var(--muted); font-weight: 500; }

    .meta-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 14px;
    }

    .palette {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: 160px;
    }

    .palette-swatch {
      width: 14px;
      height: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: var(--swatch);
      cursor: pointer;
      padding: 0;
      transition: outline-color 0.15s ease, transform 0.15s ease;
      outline: 1px solid transparent;
      outline-offset: 2px;
    }

    .palette-swatch:hover {
      transform: scale(1.12);
    }

    .palette-swatch.active {
      outline-color: var(--text);
    }

    .palette-swatch:focus-visible {
      outline-color: var(--accent);
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
      align-items: stretch;
    }

    .panel {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 22px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .panel-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel-head h2 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .panel-head .range {
      font-size: 11px;
      color: var(--dim);
      font-weight: 400;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 1px;
      background: var(--glass-border);
      border: 1px solid var(--glass-border);
      flex: 1;
      min-height: 220px;
    }

    .stat {
      background: var(--glass);
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: background 0.25s ease;
      opacity: 0.55;
    }

    .stat.ready {
      opacity: 1;
    }

    .stat:hover { background: var(--glass-strong); }

    .stat .label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
      font-weight: 500;
    }

    .stat .value {
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      min-height: 1.15em;
      color: var(--l4);
    }

    .stat .value.waiting {
      color: var(--l4);
      animation: pulse-tilde 1.1s ease-in-out infinite;
    }

    .stat .value.counting {
      color: var(--l4);
    }

    @keyframes pulse-tilde {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .stat .hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    .heat-wrap {
      overflow-x: auto;
      padding: 14px 16px 14px 4px;
      flex: 1;
      display: flex;
      align-items: center;
    }

    .heat {
      display: flex;
      gap: var(--gap);
      align-items: stretch;
      width: 100%;
      justify-content: space-between;
    }

    .heat-labels {
      display: grid;
      grid-template-rows: repeat(7, 1fr);
      gap: var(--gap);
      margin-right: 4px;
      flex: 0 0 auto;
    }

    .heat-labels span {
      display: flex;
      align-items: center;
      font-size: 9px;
      color: var(--dim);
      line-height: 1;
      font-weight: 400;
    }

    .week {
      display: grid;
      grid-template-rows: repeat(7, auto);
      gap: var(--gap);
      flex: 1 1 0;
      min-width: 0;
    }

    .cell {
      width: 100%;
      aspect-ratio: 1;
      background: var(--l0);
      border: 1px solid rgba(255,255,255,0.03);
      cursor: pointer;
      opacity: 0;
      transform: scale(0.55);
      transition:
        opacity 0.22s ease,
        transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
        outline-color 0.15s ease,
        box-shadow 0.15s ease;
      outline: 1px solid transparent;
    }

    .cell.in {
      opacity: 1;
      transform: scale(1);
    }

    .cell.out.in {
      opacity: 0.2;
    }

    .cell:hover,
    .cell:focus-visible {
      transform: scale(1.35);
      z-index: 2;
      outline-color: var(--l4);
      box-shadow: 0 0 16px rgba(var(--accent-rgb), 0.35);
    }

    .cell.out {
      pointer-events: none;
    }

    .cell.l1 { background: var(--l1); }
    .cell.l2 { background: var(--l2); }
    .cell.l3 { background: var(--l3); }
    .cell.l4 { background: var(--l4); }

    .legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 10px;
      color: var(--dim);
      font-weight: 400;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .legend.show { opacity: 1; }

    .legend .swatch {
      width: 12px;
      height: 12px;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .tooltip {
      position: fixed;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s ease, transform 0.15s ease;
      background: rgba(12, 16, 24, 0.92);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      padding: 10px 12px;
      font-size: 12px;
      min-width: 180px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    }

    .tooltip.show {
      opacity: 1;
      transform: translateY(0);
    }

    .tooltip .t-date {
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .tooltip .t-count {
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .tooltip .t-repo {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      font-weight: 400;
    }

    .repos {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }

    th {
      text-align: left;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: 500;
      padding: 0 8px 12px 0;
      border-bottom: 1px solid var(--glass-border);
    }

    th.num, td.num { text-align: left; font-variant-numeric: tabular-nums; }
    th.rank, td.rank {
      width: 42px;
      max-width: 28px;
      padding-right: 16px;
      text-align: left;
    }
    th.repo, td.repo {
      width: 200px;
      max-width: 200px;
      padding-right: 18px;
    }
    th.peak, td.peak {
      width: 148px;
      white-space: nowrap;
      padding-right: 28px;
      text-align: left;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      font-weight: 400;
    }

    th.share, td.share {
      width: auto;
      text-align: left;
      padding-left: 40px;
      padding-right: 0;
    }

    td {
      padding: 11px 8px 11px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--muted);
      font-weight: 400;
    }

    td.repo {
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    td.rank {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: var(--rank-color, var(--l3));
    }

    td.share {
      vertical-align: middle;
    }

    .share-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .share-row .bar-track {
      flex: 1 1 auto;
      min-width: 0;
    }

    .share-row .total-n {
      flex: 0 0 auto;
      color: var(--text);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      min-width: 2.5ch;
      text-align: right;
    }

    tr.skel td {
      padding-top: 14px;
      padding-bottom: 14px;
    }

    .skel-line {
      height: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.04);
      max-width: 100%;
      opacity: 0.35;
      animation: skel-pulse 1.4s ease-in-out infinite;
    }

    .skel-line.w-rank { width: 18px; }
    .skel-line.w-repo { width: 88px; }
    .skel-line.w-peak { width: 110px; }
    .skel-line.w-bar { width: 100%; height: 8px; }
    .skel-line.w-total { width: 28px; margin-left: auto; }

    tr.skel:nth-child(1) .skel-line { animation-delay: 0s; }
    tr.skel:nth-child(2) .skel-line { animation-delay: 0.08s; }
    tr.skel:nth-child(3) .skel-line { animation-delay: 0.16s; }
    tr.skel:nth-child(4) .skel-line { animation-delay: 0.24s; }
    tr.skel:nth-child(5) .skel-line { animation-delay: 0.32s; }
    tr.skel:nth-child(6) .skel-line { animation-delay: 0.4s; }
    tr.skel:nth-child(7) .skel-line { animation-delay: 0.48s; }
    tr.skel:nth-child(8) .skel-line { animation-delay: 0.56s; }
    tr.skel:nth-child(9) .skel-line { animation-delay: 0.64s; }
    tr.skel:nth-child(10) .skel-line { animation-delay: 0.72s; }

    @keyframes skel-pulse {
      0%, 100% { opacity: 0.22; }
      50% { opacity: 0.55; }
    }

    tr.row-enter td {
      animation: row-stair 0.72s cubic-bezier(0.22, 1, 0.36, 1) both;
      transform-origin: top center;
    }

    @keyframes row-stair {
      0% {
        opacity: 0;
        transform: translateY(-14px) scaleY(0.55);
      }
      65% {
        opacity: 1;
        transform: translateY(1px) scaleY(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scaleY(1);
      }
    }

    .alias-note {
      margin: 2px 2px 0;
      font-size: 10px;
      line-height: 1.45;
      color: var(--dim);
      opacity: 0;
      font-weight: 400;
      pointer-events: none;
      transition: opacity 0.55s ease;
    }

    .alias-note.show {
      opacity: 0.38;
    }

    tr { transition: background 0.2s ease; }

    tr:hover td {
      background: rgba(255,255,255,0.03);
      color: var(--text);
    }

    .bar-track {
      height: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--l2), var(--l4));
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @media (max-width: 900px) {
      .wrap { padding: 32px 18px 64px; }

      /* Curtain opens up / down on mobile */
      .curtain-panel {
        left: 0;
        right: 0;
        width: 100%;
        height: 50.5%;
        top: auto;
        bottom: auto;
      }

      .curtain-panel::after {
        background: linear-gradient(180deg, transparent, var(--glow), transparent);
      }

      .curtain-panel.left {
        top: 0;
        border-right: none;
        border-bottom: 1px solid var(--accent-soft);
        transform-origin: center top;
      }

      .curtain-panel.right {
        bottom: 0;
        right: 0;
        border-left: none;
        border-top: 1px solid var(--accent-soft);
        transform-origin: center bottom;
      }

      .splash.open .curtain-panel.left { transform: translateY(-102%); }
      .splash.open .curtain-panel.right { transform: translateY(102%); }

      header {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 16px;
      }

      header > div:first-child {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1,
      .splash-mark h1 {
        font-size: 40px;
      }

      .sub {
        max-width: 320px;
        margin-left: auto;
        margin-right: auto;
        font-size: 14px;
      }

      .meta {
        text-align: center;
        width: 100%;
        font-size: 12px;
      }

      .meta-block {
        align-items: center;
        width: 100%;
      }

      .palette {
        justify-content: center;
      }

      .stat .value {
        font-size: 36px;
      }

      .top-grid,
      .repos { grid-template-columns: 1fr; }

      .panel-head {
        justify-content: center;
        text-align: center;
      }

      .legend { justify-content: center; }

      th.share, td.share {
        padding-left: 16px;
      }
      th.peak, td.peak { display: none; }
      th.repo, td.repo { width: 140px; max-width: 140px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .curtain-panel,
      .splash-mark,
      .wrap,
      .cell,
      .legend,
      .bar-fill { transition: none !important; animation: none !important; }
      .skel-line { animation: none !important; opacity: 0.35; }
      tr.row-enter td { animation: none !important; }
      .stat .value.waiting { animation: none; opacity: 0.7; }
      .cell { opacity: 1; transform: none; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="splash" id="splash" aria-hidden="true">
    <div class="curtain">
      <div class="curtain-panel left"></div>
      <div class="curtain-panel right"></div>
    </div>
    <div class="splash-mark">
      <div class="eyebrow">Commit atlas</div>
      <h1 id="splash-name">Contributor</h1>
      <div class="line" aria-hidden="true"></div>
    </div>
  </div>

  <div class="wrap" id="wrap">
    <header>
      <div>
        <div class="eyebrow">Commit atlas</div>
        <h1 id="author-name">Contributor</h1>
        <p class="sub" id="subtitle"></p>
      </div>
      <div class="meta-block">
        <div class="meta" id="meta"></div>
        <div class="palette" id="palette" role="group" aria-label="Color palette"></div>
      </div>
    </header>

    <section class="top-grid">
      <div class="panel">
        <div class="panel-head">
          <h2>Activity heatmap</h2>
          <div class="range" id="heat-range"></div>
        </div>
        <div class="heat-wrap">
          <div class="heat" id="heat"></div>
        </div>
        <div class="legend" id="legend">
          Less
          <span class="swatch" style="background:var(--l0)"></span>
          <span class="swatch" style="background:var(--l1)"></span>
          <span class="swatch" style="background:var(--l2)"></span>
          <span class="swatch" style="background:var(--l3)"></span>
          <span class="swatch" style="background:var(--l4)"></span>
          More
        </div>
      </div>

      <div class="panel" style="padding:0; overflow:hidden;">
        <div class="stats" id="stats"></div>
      </div>
    </section>

    <section class="repos">
      <div class="panel">
        <div class="panel-head"><h2>Breakdown</h2></div>
        <table>
          <thead>
            <tr>
              <th class="rank">#</th>
              <th class="repo">Repo</th>
              <th class="peak">Peak day</th>
              <th class="share">Total</th>
            </tr>
          </thead>
          <tbody id="repo-table"></tbody>
        </table>
      </div>
      <p class="alias-note" id="disclaimer"></p>
    </section>

  <script>
    const DATA = JSON.parse(document.getElementById('contrib-data').textContent);
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const DISPLAY = DATA.display || {};
    const REPO_ALIAS = DISPLAY.aliases || {};

    const fmt = (n) => n.toLocaleString('en-US');
    const s = DATA.summary;
    const wait = (ms) => new Promise((r) => setTimeout(r, reduceMotion ? 0 : ms));

    document.title = `${DATA.author.name} — Commit Atlas`;
    document.getElementById('author-name').textContent = DATA.author.name;
    const splashName = document.getElementById('splash-name');
    if (splashName) {
      const parts = DATA.author.name.trim().split(/\s+/);
      splashName.textContent = parts[0] || DATA.author.name;
    }
    const subEl = document.getElementById('subtitle');
    if (subEl) subEl.textContent = DISPLAY.subtitle || '';
    const discEl = document.getElementById('disclaimer');
    if (discEl) {
      const text = (DISPLAY.disclaimer || '').trim();
      discEl.textContent = text ? `* ${text}` : '';
      if (!text) discEl.style.display = 'none';
    }

    document.getElementById('meta').innerHTML = `
      <div><strong>from</strong> ${DATA.range.since} → ${DATA.range.until}</div>
    `;

    const PALETTE_PRESETS = [
      { id: 'green',  hex: '#39d353', label: 'Green' },
      { id: 'lime',   hex: '#a3e635', label: 'Lime' },
      { id: 'amber',  hex: '#f59e0b', label: 'Amber' },
      { id: 'orange', hex: '#f97316', label: 'Orange' },
      { id: 'rose',   hex: '#f43f5e', label: 'Rose' },
      { id: 'violet', hex: '#a78bfa', label: 'Violet' },
      { id: 'blue',   hex: '#3b82f6', label: 'Blue' },
      { id: 'sky',    hex: '#38bdf8', label: 'Sky' },
    ];

    const ROOT = document.documentElement;
    const EMPTY = { r: 22, g: 27, b: 34 };
    const STORAGE_KEY = 'contrib-palette';

    function hexToRgb(hex) {
      const h = hex.replace('#', '');
      const n = parseInt(h.length === 3
        ? h.split('').map((c) => c + c).join('')
        : h, 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function rgbToHex({ r, g, b }) {
      return '#' + [r, g, b].map((v) => v.toString(16).padStart(2, '0')).join('');
    }

    function mix(a, b, t) {
      return {
        r: Math.round(a.r + (b.r - a.r) * t),
        g: Math.round(a.g + (b.g - a.g) * t),
        b: Math.round(a.b + (b.b - a.b) * t),
      };
    }

    function buildScale(hex) {
      const base = hexToRgb(hex);
      // Lightness steps over the empty cell tone — Less → More
      const l1 = mix(EMPTY, base, 0.32);
      const l2 = mix(EMPTY, base, 0.52);
      const l3 = mix(EMPTY, base, 0.74);
      const l4 = mix(EMPTY, base, 1);
      return {
        accent: rgbToHex(l4),
        rgb: `${l4.r}, ${l4.g}, ${l4.b}`,
        l0: rgbToHex(EMPTY),
        l1: rgbToHex(l1),
        l2: rgbToHex(l2),
        l3: rgbToHex(l3),
        l4: rgbToHex(l4),
        ranks: [l4, l3, l2, l1, mix(EMPTY, base, 0.22)].map(rgbToHex),
      };
    }

    function applyPalette(hex) {
      const scale = buildScale(hex);
      ROOT.style.setProperty('--accent', scale.accent);
      ROOT.style.setProperty('--accent-rgb', scale.rgb);
      ROOT.style.setProperty('--accent-soft', `rgba(${scale.rgb}, 0.14)`);
      ROOT.style.setProperty('--glow', `rgba(${scale.rgb}, 0.09)`);
      ROOT.style.setProperty('--l0', scale.l0);
      ROOT.style.setProperty('--l1', scale.l1);
      ROOT.style.setProperty('--l2', scale.l2);
      ROOT.style.setProperty('--l3', scale.l3);
      ROOT.style.setProperty('--l4', scale.l4);
      ROOT.dataset.palette = hex;
      document.querySelectorAll('.palette-swatch').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.hex.toLowerCase() === hex.toLowerCase());
      });
      applyRankColors(scale.ranks);
      try { localStorage.setItem(STORAGE_KEY, hex); } catch (_) {}
    }

    function rankTone(index, total, ranks) {
      if (total <= 1) return ranks[0];
      const t = index / Math.max(1, total - 1); // 0 → brightest, 1 → dimmest
      const slot = Math.min(ranks.length - 1, Math.round(t * (ranks.length - 1)));
      return ranks[slot];
    }

    function applyRankColors(ranks) {
      const tableRanks = [...document.querySelectorAll('#repo-table .rank')];
      const n = tableRanks.length;
      tableRanks.forEach((el, i) => {
        el.style.setProperty('--rank-color', rankTone(i, n, ranks));
      });
    }

    const paletteEl = document.getElementById('palette');
    PALETTE_PRESETS.forEach((p) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'palette-swatch';
      btn.dataset.hex = p.hex;
      btn.title = p.label;
      btn.setAttribute('aria-label', p.label);
      btn.style.setProperty('--swatch', p.hex);
      btn.addEventListener('click', () => applyPalette(p.hex));
      paletteEl.appendChild(btn);
    });

    let savedHex = PALETTE_PRESETS[0].hex;
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored && PALETTE_PRESETS.some((p) => p.hex.toLowerCase() === stored.toLowerCase())) {
        savedHex = stored;
      }
    } catch (_) {}
    applyPalette(savedHex);

    const statDefs = [
      ['All commits', s.total_commits, 'across 3 months'],
      ['Peak day', s.max_day_count, s.max_day_date || '—'],
      ['Repos', s.repos_with_activity, `out of ${s.repo_count} active`],
      ['Active days', s.active_days, `out of ${DATA.days.length} days`],
    ];

    document.getElementById('stats').innerHTML = statDefs.map(([label, , hint]) => `
      <div class="stat">
        <div class="label">${label}</div>
        <div class="value waiting">~</div>
        <div class="hint">${hint}</div>
      </div>
    `).join('');

    document.getElementById('heat-range').textContent =
      `${DATA.range.since} → ${DATA.range.until}`;

    const max = Math.max(1, s.max_day_count);
    function level(c) {
      if (!c) return '';
      if (c <= max * 0.25) return 'l1';
      if (c <= max * 0.5) return 'l2';
      if (c <= max * 0.75) return 'l3';
      return 'l4';
    }

    const heat = document.getElementById('heat');
    const tip = document.getElementById('tip');
    const weekEls = [];

    const labels = document.createElement('div');
    labels.className = 'heat-labels';
    ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach((t) => {
      const span = document.createElement('span');
      span.textContent = t;
      labels.appendChild(span);
    });
    heat.appendChild(labels);

    DATA.weeks.forEach((week) => {
      const col = document.createElement('div');
      col.className = 'week';
      const cells = [];
      week.forEach((day) => {
        const cell = document.createElement('div');
        cell.className = 'cell ' + (day.in_range ? level(day.count) : 'out');
        if (day.date && day.in_range) {
          cell.tabIndex = 0;
          cell.dataset.date = day.date;
          cell.dataset.count = day.count;
          cell.dataset.repos = JSON.stringify(day.by_repo || {});
          cell.setAttribute('aria-label', `${day.date}: ${day.count} commits`);
        }
        col.appendChild(cell);
        cells.push(cell);
      });
      heat.appendChild(col);
      weekEls.push(cells);
    });

    // Column by column, top → bottom (Sun → Sat) within each week
    function cellsTopToBottom() {
      const ordered = [];
      for (let w = 0; w < weekEls.length; w++) {
        for (let row = 0; row < weekEls[w].length; row++) {
          ordered.push(weekEls[w][row]);
        }
      }
      return ordered;
    }

    function displayRepo(name) {
      return REPO_ALIAS[name] || name;
    }

    function showTip(el, clientX, clientY) {
      const date = el.dataset.date;
      const count = Number(el.dataset.count || 0);
      const repos = JSON.parse(el.dataset.repos || '{}');
      const repoLines = Object.entries(repos)
        .sort((a, b) => b[1] - a[1])
        .map(([r, c]) => `${displayRepo(r)}: ${c}`)
        .join('<br>') || '—';
      tip.innerHTML = `
        <div class="t-date">${date}</div>
        <div class="t-count"><strong>${count}</strong> commit${count === 1 ? '' : 's'}</div>
        <div class="t-repo">${repoLines}</div>
      `;
      tip.classList.add('show');
      const pad = 14;
      let x = clientX + pad;
      let y = clientY + pad;
      tip.style.left = '0px';
      tip.style.top = '0px';
      const rect = tip.getBoundingClientRect();
      if (x + rect.width > window.innerWidth - 8) x = clientX - rect.width - pad;
      if (y + rect.height > window.innerHeight - 8) y = clientY - rect.height - pad;
      tip.style.left = `${Math.max(8, x)}px`;
      tip.style.top = `${Math.max(8, y)}px`;
    }

    heat.addEventListener('mousemove', (e) => {
      const el = e.target.closest('.cell[data-date]');
      if (!el) { tip.classList.remove('show'); return; }
      showTip(el, e.clientX, e.clientY);
    });
    heat.addEventListener('mouseleave', () => tip.classList.remove('show'));
    heat.addEventListener('focusin', (e) => {
      const el = e.target.closest('.cell[data-date]');
      if (!el) return;
      const r = el.getBoundingClientRect();
      showTip(el, r.right, r.bottom);
    });
    heat.addEventListener('focusout', () => tip.classList.remove('show'));

    const ranked = [...DATA.repos].sort((a, b) => b.total - a.total);
    const maxRepo = Math.max(1, ...ranked.map((r) => r.total));
    const repoTable = document.getElementById('repo-table');

    function repoPeak(r) {
      const daily = r.daily || {};
      let bestN = 0;
      let bestD = null;
      for (const [d, n] of Object.entries(daily)) {
        if (n > bestN) {
          bestN = n;
          bestD = d;
        }
      }
      return { n: bestN, d: bestD };
    }

    function skeletonRow() {
      return `
        <tr class="skel">
          <td class="rank"><div class="skel-line w-rank"></div></td>
          <td class="repo"><div class="skel-line w-repo"></div></td>
          <td class="peak"><div class="skel-line w-peak"></div></td>
          <td class="share">
            <div class="share-row">
              <div class="skel-line w-bar"></div>
              <div class="skel-line w-total"></div>
            </div>
          </td>
        </tr>
      `;
    }

    function realRow(r, i) {
      const peak = repoPeak(r);
      const peakLabel = peak.d ? `${fmt(peak.n)} · ${peak.d}` : '—';
      return `
        <tr>
          <td class="rank">#${i + 1}</td>
          <td class="repo" title="${r.repo}">${displayRepo(r.repo)}</td>
          <td class="peak">${peakLabel}</td>
          <td class="share">
            <div class="share-row">
              <div class="bar-track"><div class="bar-fill" data-w="${(r.total / maxRepo) * 100}"></div></div>
              <span class="total-n">${fmt(r.total)}</span>
            </div>
          </td>
        </tr>
      `;
    }

    repoTable.innerHTML = ranked.map(() => skeletonRow()).join('');

    async function animateTable() {
      const rows = [...repoTable.querySelectorAll('tr')];
      const note = document.querySelector('.alias-note');
      if (reduceMotion) {
        repoTable.innerHTML = ranked.map((r, i) => realRow(r, i)).join('');
        applyRankColors(buildScale(ROOT.dataset.palette || savedHex).ranks);
        requestAnimationFrame(() => {
          document.querySelectorAll('.bar-fill').forEach((el) => {
            el.style.width = el.dataset.w + '%';
          });
        });
        if (note) note.classList.add('show');
        return;
      }

      // Staircase: first → last (slide down + grow)
      for (let i = 0; i < rows.length; i++) {
        const tmp = document.createElement('tbody');
        tmp.innerHTML = realRow(ranked[i], i).trim();
        const next = tmp.firstElementChild;
        next.classList.add('row-enter');
        rows[i].replaceWith(next);
        rows[i] = next;
        applyRankColors(buildScale(ROOT.dataset.palette || savedHex).ranks);
        const fill = next.querySelector('.bar-fill');
        requestAnimationFrame(() => {
          if (fill) fill.style.width = fill.dataset.w + '%';
        });
        await wait(160);
      }
      if (note) note.classList.add('show');
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function animateCount(el, target, duration = 900) {
      return new Promise((resolve) => {
        if (reduceMotion) {
          el.textContent = fmt(target);
          el.classList.remove('waiting');
          el.classList.add('counting');
          resolve();
          return;
        }
        el.classList.remove('waiting');
        el.classList.add('counting');
        const start = performance.now();
        function frame(now) {
          const t = Math.min(1, (now - start) / duration);
          const value = Math.round(easeOutCubic(t) * target);
          el.textContent = fmt(value);
          if (t < 1) requestAnimationFrame(frame);
          else {
            el.textContent = fmt(target);
            resolve();
          }
        }
        requestAnimationFrame(frame);
      });
    }

    async function animateHeatmap() {
      const cells = cellsTopToBottom();
      if (reduceMotion) {
        cells.forEach((c) => c.classList.add('in'));
        document.getElementById('legend').classList.add('show');
        return;
      }
      const step = Math.max(8, Math.min(18, Math.floor(1600 / Math.max(1, cells.length))));
      for (const cell of cells) {
        cell.classList.add('in');
        await wait(step);
      }
      document.getElementById('legend').classList.add('show');
    }

    async function animateStats() {
      const nodes = [...document.querySelectorAll('#stats .stat')];
      for (let i = 0; i < nodes.length; i++) {
        const stat = nodes[i];
        const valueEl = stat.querySelector('.value');
        const target = statDefs[i][1];
        stat.classList.add('ready');
        await animateCount(valueEl, target, 850);
        await wait(120);
      }
    }

    async function runIntro() {
      const splash = document.getElementById('splash');
      const wrap = document.getElementById('wrap');

      if (reduceMotion) {
        splash.classList.add('done');
        wrap.classList.add('revealed');
        document.querySelectorAll('.cell').forEach((c) => c.classList.add('in'));
        document.getElementById('legend').classList.add('show');
        await animateStats();
        await animateTable();
        return;
      }

      await wait(720);
      splash.classList.add('open');
      await wait(380);
      wrap.classList.add('revealed');
      await wait(780);
      splash.classList.add('done');

      await animateHeatmap();
      await wait(180);
      await animateStats();
      await wait(160);
      await animateTable();
    }

    runIntro();
  </script>
</body>
</html>
